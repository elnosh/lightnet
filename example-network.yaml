# This is a template showing all available options for defining a lightnet network.
# Copy this file, rename it (e.g. mynetwork.yaml), and customize it.
# Ports are auto-allocated at start time — no port configuration needed.

name: mynetwork

# --- Bitcoin nodes ---
# At least one bitcoind node is required for lightning nodes to connect to.
bitcoind:
  - name: btc1
    version: "30.2"

# --- LND nodes ---
lnd:
  - name: alice
    version: "0.20.1-beta"
    connects_to: btc1

  - name: bob
    version: "0.20.1-beta"
    connects_to: btc1

  - name: charlie
    version: "0.20.1-beta"
    connects_to: btc1

# --- Core Lightning nodes ---
# cln:
#   - name: carol
#     # version: "25.12"  # optional — this is the default
#     connects_to: btc1

# --- LDK-server nodes ---
ldk_server:
  - name: dave
    connects_to: btc1
